<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comic Chat Multiplayer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Bangers&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #1e293b;
            --accent-yellow: #facc15;
            --accent-pink: #ec4899;
            --accent-cyan: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-width: 3px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            min-height: 100vh;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 2px, transparent 2px);
            background-size: 20px 20px;
            pointer-events: none;
            z-index: 0;
        }

        header {
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: var(--border-width) solid #000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-family: 'Bangers', cursive;
            font-size: 2.5rem;
            letter-spacing: 2px;
            color: var(--accent-yellow);
            text-shadow: 3px 3px 0px #000, 5px 5px 0px var(--accent-pink);
            transform: rotate(-1deg);
        }

        .user-setup {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        input, button {
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            padding: 0.6rem 1rem;
            border: var(--border-width) solid #000;
            border-radius: 8px;
            outline: none;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        input {
            background-color: #0f172a;
            color: #fff;
            box-shadow: inset 2px 2px 0px rgba(0,0,0,0.5);
        }

        input:focus {
            border-color: var(--accent-cyan);
        }

        .username-input {
            width: 180px;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--accent-yellow);
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
            z-index: 5;
            padding: 1.5rem;
            gap: 1.5rem;
        }

        .comic-strip-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(30, 41, 59, 0.3);
            border: var(--border-width) solid #000;
            border-radius: 12px;
            padding: 1.5rem;
            overflow-y: auto;
            box-shadow: 6px 6px 0px #000;
        }

        .comic-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            justify-content: center;
        }

        .comic-panel {
            background: #ffffff;
            border: 2px solid #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.15);
            transform: rotate(var(--rot, 0deg));
            transition: all 0.3s ease;
            animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
            width: 340px;
            flex-shrink: 0;
            position: relative;
        }

        .comic-panel:hover {
            transform: scale(1.06) rotate(0deg) !important;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.25);
            z-index: 10;
        }

        .comic-panel img {
            width: 100%;
            height: auto;
            display: block;
            background: #ffffff;
        }

        .panel-info {
            padding: 0.4rem 0.65rem;
            background: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 2px solid #000;
        }

        .panel-sender {
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #000000;
        }

        .panel-time {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .scene-badge {
            position: absolute;
            top: 6px;
            left: 6px;
            background: rgba(15, 23, 42, 0.75);
            color: var(--accent-yellow);
            font-size: 0.65rem;
            font-weight: 800;
            padding: 2px 7px;
            border-radius: 6px;
            backdrop-filter: blur(4px);
            z-index: 5;
        }

        .control-bar {
            padding: 1.25rem 2rem;
            background: rgba(15, 23, 42, 0.95);
            border-top: var(--border-width) solid #000;
            display: flex;
            gap: 1rem;
            z-index: 10;
            align-items: center;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
        }

        .message-input {
            flex: 1;
        }

        button {
            background-color: var(--accent-pink);
            color: #000;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 3px 3px 0px #000;
        }

        button:hover {
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0px #000;
            background-color: #f472b6;
        }

        button:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px #000;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
            padding: 3rem 2rem;
        }

        .empty-state h3 {
            font-family: 'Bangers', cursive;
            font-size: 2rem;
            color: var(--accent-cyan);
            margin-bottom: 0.5rem;
        }

        @keyframes popIn {
            0% { transform: scale(0.7) rotate(-5deg); opacity: 0; }
            100% { transform: scale(1) rotate(var(--rot, 0deg)); opacity: 1; }
        }

        /* Custom Scrollbars */
        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #334155;
            border-radius: 6px;
            border: 3px solid #0f172a;
        }

        /* Room UI */
        .room-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(6, 182, 212, 0.15);
            border: 2px solid var(--accent-cyan);
            border-radius: 8px;
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            color: var(--accent-cyan);
            font-weight: 600;
        }

        .room-badge .room-id {
            font-family: monospace;
            color: var(--text-main);
        }

        .invite-btn {
            background: var(--accent-cyan);
            color: #000;
            font-size: 0.8rem;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            border: 2px solid #000;
            cursor: pointer;
            font-weight: 800;
            box-shadow: 2px 2px 0px #000;
            transition: all 0.15s;
        }

        .invite-btn:hover {
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0px #000;
        }

        .copied-toast {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: var(--accent-cyan);
            color: #000;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 800;
            border: 3px solid #000;
            box-shadow: 4px 4px 0px #000;
            z-index: 100;
            animation: fadeOut 2s ease forwards;
        }

        @keyframes fadeOut {
            0%, 70% { opacity: 1; }
            100% { opacity: 0; pointer-events: none; }
        }

        /* Lobby */
        .lobby-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 2rem;
            position: relative;
            z-index: 5;
        }

        .lobby-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            border: 3px solid #000;
            border-radius: 16px;
            padding: 3rem;
            text-align: center;
            box-shadow: 8px 8px 0px #000;
            max-width: 480px;
            width: 90%;
        }

        .lobby-card h2 {
            font-family: 'Bangers', cursive;
            font-size: 3rem;
            color: var(--accent-yellow);
            text-shadow: 3px 3px 0px #000, 5px 5px 0px var(--accent-pink);
            margin-bottom: 0.5rem;
        }

        .lobby-card p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .lobby-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            font-size: 1.2rem;
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
            background: var(--accent-pink);
            color: #000;
            border: 3px solid #000;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000;
            transition: all 0.2s;
            margin-bottom: 1rem;
        }

        .lobby-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #000;
        }

        .lobby-btn.secondary {
            background: var(--accent-cyan);
        }

        .join-row {
            display: flex;
            gap: 0.5rem;
        }

        .join-row input {
            flex: 1;
        }

        .join-row button {
            white-space: nowrap;
        }

        /* Status Bar Styles */
        .status-bar {
            display: none;
            padding: 0.6rem 2rem;
            background: rgba(15, 23, 42, 0.95);
            border-top: 2px solid #000;
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--accent-yellow);
            align-items: center;
            gap: 0.75rem;
            z-index: 9;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--accent-yellow);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Stats Bar Styles */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.4rem 2rem;
            background: rgba(15, 23, 42, 0.85);
            border-top: 1px solid #1e293b;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
            z-index: 8;
        }

        .stats-bar span {
            color: var(--accent-cyan);
            font-family: monospace;
        }
    </style>
</head>
<body>

    <!-- LOBBY VIEW (shown on / root) -->
    <div id="lobbyView" class="lobby-container" style="display:none;">
        <div class="lobby-card">
            <h2>COMIC CHAT!</h2>
            <p>Create a room and invite friends to chat in comic style.</p>
            <button class="lobby-btn" onclick="createRoom()">⚡ CREATE NEW ROOM</button>
            <div class="join-row">
                <input type="text" id="joinRoomInput" placeholder="Enter room ID...">
                <button class="lobby-btn secondary" style="width:auto; margin:0;" onclick="joinRoom()">JOIN</button>
            </div>
        </div>
    </div>

    <!-- CHAT VIEW (shown on /room/{id}) -->
    <div id="chatView" style="display:none; flex-direction:column; height:100vh;">
        <header>
            <h1>COMIC CHAT!</h1>
            <div style="display:flex; align-items:center; gap:1rem;">
                <div class="room-badge">
                    🏠 Room: <span class="room-id" id="roomIdBadge"></span>
                    <button class="invite-btn" onclick="copyInviteLink()">📋 COPY LINK</button>
                </div>
                <div class="user-setup">
                    <input type="text" id="usernameInput" class="username-input" placeholder="YOUR HERO NAME...">
                </div>
            </div>
        </header>

        <div class="main-container">
            <div class="comic-strip-container" id="stripContainer">
                <div class="empty-state" id="emptyState">
                    <h3>No panels generated yet!</h3>
                    <p>Send a message below to start the comic strip sequence.</p>
                </div>
                <div class="comic-grid" id="comicGrid"></div>
            </div>
        </div>

        <div class="status-bar" id="statusBar">
            <span class="spinner"></span>
            <span id="statusText">✏️ SENDING COMIC...</span>
        </div>

        <div class="stats-bar" id="statsBar">
            <div>last response took: <span id="statLatency">-- ms</span></div>
            <div>chat messages: <span id="statCount">0</span></div>
        </div>

        <div class="control-bar">
            <input type="text" id="messageInput" class="message-input" placeholder="Type what your character says..." onkeydown="if(event.key === 'Enter') sendMessage()">
            <button id="sendBtn" onclick="sendMessage()">POW! SEND</button>
        </div>
    </div>

    <script>
        // Determine if we're in a room or at the lobby
        const pathParts = window.location.pathname.split('/');
        let currentRoomId = null;
        if (pathParts[1] === 'room' && pathParts[2]) {
            currentRoomId = pathParts[2];
        }

        if (currentRoomId) {
            // CHAT MODE
            document.getElementById('chatView').style.display = 'flex';
            document.getElementById('roomIdBadge').textContent = currentRoomId;

            // Extract username from URL query param
            const urlParams = new URLSearchParams(window.location.search);
            let userParam = urlParams.get('user');
            if (!userParam || !userParam.trim()) {
                userParam = prompt("What is your character name?");
                if (!userParam || !userParam.trim()) {
                    userParam = "hero_" + Math.floor(Math.random() * 1000);
                }
                userParam = userParam.trim();
                const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?user=' + encodeURIComponent(userParam);
                window.history.pushState({ path: newUrl }, '', newUrl);
            }
            document.getElementById('usernameInput').value = userParam;

            const backendOrigin = window.location.hostname === 'localhost'
                ? `${window.location.protocol}//${window.location.host}`
                : (window.localStorage.getItem('comicChatBackendOrigin') || 'https://comic-chat-b3zzuedwgq-uc.a.run.app');
            const wsOrigin = backendOrigin.replace(/^http/, 'ws');
            const socket = new WebSocket(`${wsOrigin}/ws?room=${encodeURIComponent(currentRoomId)}`);

            const comicGrid = document.getElementById('comicGrid');
            const emptyState = document.getElementById('emptyState');
            const messageInput = document.getElementById('messageInput');
            const usernameInput = document.getElementById('usernameInput');

            let sceneCount = 0;
            let messageCount = 0;
            const statusBar = document.getElementById('statusBar');
            const statLatency = document.getElementById('statLatency');
            const statCount = document.getElementById('statCount');

            socket.onmessage = function(event) {
                const data = JSON.parse(event.data);
                if (data.type === 'status') {
                    if (data.status === 'generating') {
                        const currentUsername = usernameInput.value.trim() || 'Hero1';
                        const statusText = document.getElementById('statusText');
                        if (data.sender === currentUsername) {
                            statusText.textContent = "✏️ SENDING COMIC...";
                        } else {
                            statusText.textContent = `✏️ ${escapeHtml(data.sender)} is sending a comic...`;
                        }
                        statusBar.style.display = 'flex';
                    }
                } else if (data.type === 'new_panel') {
                    emptyState.style.display = 'none';
                    statusBar.style.display = 'none';

                    // Update performance statistics
                    if (data.duration_ms !== undefined) {
                        statLatency.textContent = `${data.duration_ms} ms`;
                    }
                    messageCount++;
                    statCount.textContent = messageCount;

                    let panel = document.getElementById(`panel-${data.panel_id}`);
                    
                    if (panel) {
                        const img = panel.querySelector('img');
                        img.src = `${data.image_url}?t=${Date.now()}`;
                        const senderSpan = panel.querySelector('.panel-sender');
                        senderSpan.textContent = data.sender;
                    } else {
                        sceneCount++;
                        const rot = (Math.random() * 2 - 1).toFixed(1);
                        panel = document.createElement('div');
                        panel.className = 'comic-panel';
                        panel.id = `panel-${data.panel_id}`;
                        panel.style.setProperty('--rot', `${rot}deg`);

                        const dateStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

                        panel.innerHTML = `
                            <div class="scene-badge">SCENE ${sceneCount}</div>
                            <img src="${data.image_url}?t=${Date.now()}" alt="Comic Panel">
                            <div class="panel-info">
                                <span class="panel-sender">${escapeHtml(data.sender)}</span>
                                <span class="panel-time">${dateStr}</span>
                            </div>
                        `;

                        comicGrid.appendChild(panel);
                    }
                    
                    const container = document.getElementById('stripContainer');
                    container.scrollTop = container.scrollHeight;
                }
            };

            socket.onclose = function() {
                console.log('WS Connection closed.');
            };

            window.sendMessage = function() {
                const text = messageInput.value.trim();
                const sender = usernameInput.value.trim() || 'Hero';
                if (!text) return;

                socket.send(JSON.stringify({
                    type: 'chat_message',
                    sender: sender,
                    text: text
                }));

                messageInput.value = '';
            };
        } else {
            // LOBBY MODE
            document.getElementById('lobbyView').style.display = 'flex';
        }

        window.createRoom = async function() {
            const resp = await fetch('/api/create-room', { method: 'POST' });
            const data = await resp.json();
            window.location.href = `/room/${data.room_id}`;
        };

        window.joinRoom = function() {
            const roomId = document.getElementById('joinRoomInput').value.trim();
            if (roomId) {
                window.location.href = `/room/${roomId}`;
            }
        };

        window.copyInviteLink = function() {
            const url = `${window.location.origin}${window.location.pathname}`;
            navigator.clipboard.writeText(url).then(() => {
                const toast = document.createElement('div');
                toast.className = 'copied-toast';
                toast.textContent = '✅ Invite link copied!';
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            });
        };

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
